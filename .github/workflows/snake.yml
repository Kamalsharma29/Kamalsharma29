name: Generate contribution snake

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?palette=github-light&color_snake=%23ff8c00&color_dots=%23d9f99d,%23bef264,%2384cc16,%2365a30d,%234d7c0f
            dist/github-snake-dark.svg?palette=github-dark&color_snake=%23ff8c00&color_dots=%2314532d,%23166534,%2322c55e,%234ade80,%2386efac

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}








