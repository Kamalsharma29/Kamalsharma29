name: Generate contribution snake

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?palette=github-light&color_snake=6d28d9&color_dots=#f8fafc,#e2e8f0,#c4b5fd,#8b5cf6,#5eead4
            dist/github-snake-dark.svg?palette=github-dark&color_snake=f472b6&color_dots=#070b14,#151d33,#2d1b69,#5eead4,#c4b5fd

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
