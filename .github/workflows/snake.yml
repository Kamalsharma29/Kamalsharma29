name: Generate contribution snake

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?palette=github-light&color_snake=6d28d9&color_dots=#f1f5f9,#cbd5e1,#94a3b8,#5eead4,#8b5cf6
            dist/github-snake-dark.svg?palette=github-dark&color_snake=f472b6&color_dots=#2d3548,#475569,#64748b,#2dd4bf,#e9d5ff

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
